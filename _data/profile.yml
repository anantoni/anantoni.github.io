focus_areas:
  - title: AI economics
    description: Incentives, labor relations, market concentration, and the business logic driving contemporary AI systems.
  - title: Software infrastructure
    description: The technical layers that quietly shape reliability, dependency, security, and institutional power.
  - title: Platform governance
    description: How firms, interfaces, and policy regimes structure control over digital markets and public discourse.
  - title: Program analysis
    description: Static analysis of Java and the engineering tradeoffs involved in precise, scalable analysis at real-world size.

principles:
  - title: Evidence over spectacle
    description: Technology is easier to understand once investor theater and launch-event mythology are stripped away.
  - title: Technical depth for public readers
    description: Complex systems deserve careful explanation, not buzzwords or condescension.
  - title: Institutions matter
    description: I focus on incentives, governance, and the organizations behind technical systems, not just the products themselves.

