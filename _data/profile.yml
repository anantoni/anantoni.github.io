name: Anastasios Antoniadis
eyebrow: Investigative journalist / PhD researcher / technical writer
headline: I investigate technology as infrastructure, business, and power.
meta_description: Anastasios Antoniadis is an investigative journalist, writer, and PhD researcher based in Greece, covering AI, software systems, platform power, and digital culture.
sidebar_bio: Based in Greece, I work across investigative reporting, long-form criticism, research, and technical writing, with a focus on AI, software systems, platform power, and digital culture.
hero_intro: "Based in Greece, I work at the intersection of technology, artificial intelligence, software engineering, business, and digital culture. The aim is consistent across all of it: look past hype, identify what is actually happening, and explain why it matters."
author_note: Anastasios Antoniadis is an investigative journalist, writer, and PhD researcher whose work connects technical expertise with public understanding.
footer_note: Reporting, research, and technical writing on AI, software systems, platform power, and digital culture.

